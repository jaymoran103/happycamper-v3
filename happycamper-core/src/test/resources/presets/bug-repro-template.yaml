name: bug-repro-template
description: >
  Copy-paste template for bug reproductions. Points at the smallest valid roster
  so the app launches instantly and the bug is the only variable. Fork this file
  per bug, rename to e.g. bug-IT-1234.yaml, swap CSV paths as needed.
camperFile: miniRosters/miniCampers.csv
activityFile: miniRosters/miniActivities.csv
session: 1
features: []
# With no features enabled, every assertion is SKIPPED. This block also serves as
# the schema reference for bug-repro forks — replace the expected statuses as needed.
expectedOutputs:
  expectedAssertions:
    all_campers_have_max_rounds: { status: SKIPPED }
    round_counts_numeric:        { status: SKIPPED }
    no_duplicate_round_entries:  { status: SKIPPED }
    no_unrequested_activities:   { status: SKIPPED }
    no_swim_conflicts:           { status: SKIPPED }
