name: warn-wrong-session
description: Mini campers + activities loaded as session 2 — campers' program data covers session 1, so ProgramFeature emits PROGRAM_PARSING_FAILURE warnings. The IT pins only the assertion outcomes.
camperFile: miniRosters/miniCampers.csv
activityFile: miniRosters/miniActivities.csv
session: 2
features:
  - activity
  - program
# expectedAssertions reflect the actual outputs of the assertion pipeline against
# these CSVs. If a future PR edits either CSV or the feature list, the IT will
# trip — update both the CSV and these expectations together.
expectedOutputs:
  expectedAssertions:
    all_campers_have_max_rounds: { status: FAILED }
    round_counts_numeric:        { status: PASSED }
    no_duplicate_round_entries:  { status: PASSED }
    no_unrequested_activities:   { status: SKIPPED }
    no_swim_conflicts:           { status: SKIPPED }
